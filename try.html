<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Initiatives</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-green: #EF0524;
            --primary-green-hover: #d90420;
            --primary-green-dark: #c8031c;
            --primary-green-darker: #a90218;
            --dark-blue: #1b2253;
            --dark-green: #1b2253;
            --text-dark: #2c3e50;
            --bg-white: #fff;
            --bg-light: #f8f9fa;
            --bg-dark: #1a1a1a;
            --bg-darker: #111;
            --bg-card: #f2f4f6;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-light: #999;
            --text-lighter: #9b9b9b;
            --text-white: #fff;
            --text-muted: #ccc;
            --border-light: #e0e0e0;
            --border-lighter: #eee;
            --border-dark: #ddd;
            --border-card: #dde1de;
            --accent-orange: #2c3e50;
            --accent-orange-light: #2c3e50;
            --card-teal: #cce0ff;
            --card-beige: #e26a6a;
            --card-pink: #fff4b3;
            --feature-light-bg: #f0f8ec;
            --shadow-sm: 0 2px 7px 0 rgba(0, 0, 0, .07);
            --shadow-md: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.2);
            --shadow-xl: 0 8px 24px rgba(0, 0, 0, 0.1);
            --shadow-2xl: 0 8px 32px rgba(0, 0, 0, 0.15);
            --overlay-dark: rgba(0, 0, 0, 0.5);
            --overlay-darker: rgba(0, 0, 0, 0.55);
            --white-alpha-1: rgba(255, 255, 255, 0.05);
            --white-alpha-2: rgba(255, 255, 255, 0.08);
            --white-alpha-3: rgba(255, 255, 255, 0.1);
            --white-alpha-4: rgba(255, 255, 255, 0.3);
            --white-alpha-5: rgba(255, 255, 255, 0.8);
            --white-alpha-6: rgba(255, 255, 255, 0.9);
            --green-alpha: rgba(225, 116, 72, 0.1);
            --green-alpha-light: rgba(217, 120, 87, 0.4);
            --green-alpha-lighter: rgba(232, 107, 44, 0.1);
            --green-alpha-fade: rgba(224, 129, 114, 0.3);
            --black-alpha: rgba(0, 0, 0, 0.2);
            --highlight-color: #ffdbcc;
            --gradient-green: linear-gradient(135deg, var(--primary-green), var(--primary-green-hover));
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 20px;
            --radius-2xl: 25px;
            --radius-3xl: 30px;
            --radius-4xl: 40px;
            --radius-full: 50%;
            --radius-66: 66px;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --font-xs: 0.75rem;
            --font-sm: 0.9rem;
            --font-base: 1rem;
            --font-lg: 1.1rem;
            --font-xl: 1.5rem;
            --font-2xl: 2rem;
            --font-3xl: 2.5rem;
            --font-4xl: 3.5rem;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .qi-section {
            padding: 80px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER */
        .qi-header {
            text-align: center;
            margin-bottom: 56px;
        }

        .qi-header .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: var(--font-sm);
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--primary-green);
            margin-bottom: 14px;
        }

        .qi-header .eyebrow::before,
        .qi-header .eyebrow::after {
            content: '';
            display: block;
            width: 32px;
            height: 2px;
            background: var(--primary-green);
        }

        .qi-header h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(2rem, 5vw, var(--font-4xl));
            font-weight: 800;
            color: var(--dark-blue);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.05;
        }

        .qi-header h2 span {
            color: var(--primary-green);
        }

        .qi-header p {
            margin-top: 14px;
            font-size: var(--font-base);
            color: var(--text-secondary);
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.65;
        }

        /* DIVIDER */
        .qi-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 50px;
        }

        .qi-divider span {
            display: block;
            height: 3px;
            border-radius: 99px;
        }

        .qi-divider .d1 {
            width: 60px;
            background: var(--dark-blue);
        }

        .qi-divider .d2 {
            width: 14px;
            background: var(--primary-green);
        }

        .qi-divider .d3 {
            width: 6px;
            background: var(--primary-green);
        }

        /* BANNER */
        .qi-banner {
            margin-top: 48px;
            background: var(--dark-blue);
            border-radius: var(--radius-lg);
            padding: 30px 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-2xl);
            position: relative;
            overflow: hidden;
        }

        .qi-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-green);
        }

        .qi-banner-text h3 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: var(--font-xl);
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-white);
            letter-spacing: 0.06em;
        }

        .qi-banner-text p {
            font-size: var(--font-sm);
            color: var(--text-muted);
            margin-top: 4px;
        }

        .qi-banner-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-xl);
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .badge-red {
            background: var(--primary-green);
            color: var(--text-white);
        }

        .badge-outline {
            background: transparent;
            border: 1.5px solid var(--white-alpha-4);
            color: var(--text-muted);
        }

        .badge svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .qi-section {
                padding: 48px 18px;
            }

            .qi-banner {
                padding: 22px 20px;
            }
        }
    </style>
</head>

<body>

    <section class="qi-section">

        <div class="qi-header">
            <div class="eyebrow">Quality Initiatives</div>
            <h2>Built on <span>Precision.</span><br>Driven by Quality.</h2>
            <p>
        </div>

        <div class="qi-divider">
            <span class="d1"></span><span class="d2"></span><span class="d3"></span>
        </div>



        <div class="qi-banner">
            <div class="qi-banner-text">
                <h3>Certified. Traceable. Reliable.</h3>
                <p>Every part. Every batch. Every time.</p>
            </div>
            <div class="qi-banner-badges">
                <div class="badge badge-red">
                    <svg viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    ISO Compliant
                </div>
                <div class="badge badge-outline">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 8v4l3 3" />
                    </svg>
                    100% Lot Traced
                </div>
                <div class="badge badge-outline">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    OEM Approved
                </div>
            </div>
        </div>

    </section>

</body>

</html>
